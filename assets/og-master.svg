<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1411"/>
      <stop offset="1" stop-color="#0a0a0b"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.35" r="0.6">
      <stop offset="0" stop-color="#2f9e5b" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#2f9e5b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="flag" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3fb06b"/>
      <stop offset="1" stop-color="#25804a"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Left: wordmark + tagline -->
  <text x="90" y="250" font-family="Inter, Arial, sans-serif" font-size="78" font-weight="800" fill="#f2f4f3">Log My Golf</text>
  <text x="92" y="320" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="500" fill="#b4b4b8">Track your scores, handicap &amp; rounds.</text>
  <text x="92" y="366" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="500" fill="#b4b4b8">Follow other golfers and compete.</text>

  <!-- Pill -->
  <rect x="92" y="430" width="240" height="64" rx="32" fill="#2f9e5b"/>
  <text x="212" y="472" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#06140c">logmygolf.com</text>

  <!-- Right: large flag mark -->
  <g transform="translate(870,150) scale(1.05)">
    <ellipse cx="150" cy="300" rx="135" ry="40" fill="#0c2e1c"/>
    <rect x="138" y="-10" width="20" height="310" rx="10" fill="#e9efe9"/>
    <circle cx="148" cy="-10" r="18" fill="#e9efe9"/>
    <path d="M158 8 C 244 -8, 330 48, 410 22 C 380 78, 380 134, 410 190 C 330 164, 244 220, 158 200 Z" fill="url(#flag)"/>
    <circle cx="40" cy="306" r="44" fill="#ffffff"/>
  </g>
</svg>
