<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#37b069"/>
      <stop offset="1" stop-color="#1f6e40"/>
    </linearGradient>
    <linearGradient id="flag" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e9efe9"/>
    </linearGradient>
    <radialGradient id="sheen" cx="0.3" cy="0.22" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="ds" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0a2a18" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Full-bleed background (OS masks corners for app icons) -->
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <rect width="1024" height="1024" fill="url(#sheen)"/>

  <!-- The hole: an elliptical dark cup on the green -->
  <ellipse cx="512" cy="724" rx="150" ry="46" fill="#103a23"/>
  <ellipse cx="512" cy="716" rx="150" ry="46" fill="#0c2e1c"/>

  <!-- Flag group, anchored in the hole -->
  <g filter="url(#ds)">
    <!-- Flagpole -->
    <rect x="497" y="300" width="22" height="420" rx="11" fill="url(#flag)"/>
    <!-- Pole top knob -->
    <circle cx="508" cy="300" r="20" fill="url(#flag)"/>
    <!-- Pennant flag waving right -->
    <path d="M519 318
             C 612 300, 705 360, 792 332
             C 760 392, 760 452, 792 512
             C 705 484, 612 544, 519 522 Z"
          fill="url(#flag)"/>
  </g>

  <!-- Golf ball resting near the cup -->
  <g filter="url(#ds)">
    <circle cx="372" cy="734" r="50" fill="#ffffff"/>
    <circle cx="356" cy="722" r="6" fill="#d3dcd4"/>
    <circle cx="384" cy="720" r="6" fill="#d3dcd4"/>
    <circle cx="372" cy="744" r="6" fill="#d3dcd4"/>
    <circle cx="396" cy="742" r="6" fill="#d3dcd4"/>
    <circle cx="350" cy="746" r="6" fill="#d3dcd4"/>
  </g>
</svg>
